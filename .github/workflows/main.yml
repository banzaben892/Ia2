name: Build APK with Auto-Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Verify environment
        run: |
          java -version
          echo $JAVA_HOME

      - name: Create Bubblewrap project (non-interactive)
        run: |
          mkdir android
          cd android

          bubblewrap init \
            --manifest-url=https://banzaben892.github.io/Ia2/manifest.json \
            --directory=. \
            --name="MiniChatGPT" \
            --packageId="com.minichatgpt.app" \
            --skipPwaValidation \
            --offline

      - name: Accept JDK automatically
        run: |
          cd android
          printf "No\n" | bubblewrap init || true

      - name: Build APK
        run: |
          cd android
          bubblewrap build

      - name: Find APK
        run: find android -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiniChatGPT-APK
          path: android/**/*.apk
