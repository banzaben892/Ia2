name: Build APK with Auto-Update

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=MiniChatGPT, OU=Dev, O=Personal, L=City, S=State, C=FR"

      - name: Initialize Bubblewrap
        run: |
          bubblewrap init --manifest-url=https://TON-USER.github.io/mini-chatgpt/manifest.json --directory=android

      - name: Build APK
        run: |
          cd android
          bubblewrap build

      - name: Sign APK
        run: |
          cd android
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore ../release.keystore -storepass android -keypass android app-release-unsigned.apk release
          zipalign -v 4 app-release-unsigned.apk app-release-signed.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniChatGPT-APK
          path: android/app-release-signed.apk

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "Release v${{ github.run_number }}"
          files: android/app-release-signed.apk
          body: |
            ## 🤖 Mini ChatGPT - Build automatique
            
            ✅ APK généré automatiquement
            📅 Date : ${{ github.event.head_commit.timestamp }}
            🔧 Commit : ${{ github.sha }}
            
            ### Téléchargement
            Téléchargez l'APK ci-dessous pour installer sur Android.
            
            ### Notes de version
            - IA améliorée (compréhension contextuelle)
            - Nouveaux sujets de conversation
            - Mise à jour automatique
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
