<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7aa2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mini ChatGPT">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <title>Mini ChatGPT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span>🤖 Mini ChatGPT</span>
      <button id="installBtn" style="display:none; background:white; border:none; border-radius:8px; padding:4px 12px; cursor:pointer; font-size:0.8rem;">📱 Installer</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Écris ton message..." autofocus>
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'inline-block';
      document.getElementById('installBtn').addEventListener('click', () => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          document.getElementById('installBtn').style.display = 'none';
        });
      });
    });
  </script>

  <script src="data/storage.js"></script>
  <script src="data/memory.js"></script>
  <script src="ai/rules.js"></script>
  <script src="ai/ia1.js"></script>
  <script src="ai/ia2.js"></script>
  <script src="ai/ia3.js"></script>
  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('Service Worker enregistré'))
          .catch(err => console.log('Erreur SW:', err));
      });
    }
  </script>
</body>
</html>
